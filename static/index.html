<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Assistant</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 60px auto; padding: 0 20px; background: #f5f5f5; }
    h1 { color: #333; }
    textarea { width: 100%; padding: 10px; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; }
    button { margin-top: 10px; padding: 10px 24px; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
    button:hover { background: #4338ca; }
    #result { margin-top: 24px; background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; display: none; }
    #answer { white-space: pre-wrap; color: #333; }
    .label { font-size: 12px; color: #888; margin-bottom: 6px; }
  </style>
</head>
<body>
  <h1>Smart Technical Assistant</h1>
  <p>Ask a technical question or check sensor status.</p>

  <textarea id="question" rows="4" placeholder="e.g. What is UART? or Check my sensor readings"></textarea>
  <br>
  <button onclick="askQuestion()">Ask</button>

  <div id="result">
    <div class="label">Answer</div>
    <div id="answer"></div>
  </div>

  <script>
    async function askQuestion() {
      const question = document.getElementById("question").value;
      if (!question.trim()) return;

      document.getElementById("answer").innerText = "Thinking...";
      document.getElementById("result").style.display = "block";

      const response = await fetch("http://127.0.0.1:8000/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question: question })
      });

      const data = await response.json();
      document.getElementById("answer").innerText = data.response;
    }
  </script>
</body>
</html>
